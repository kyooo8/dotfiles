[username]
show_always = true
style_user = "bg:#FFFFFF fg:#000000"
style_root = "bg:#FFFFFF fg:#000000"
format = '[$user ]($style)'
disabled = false

[os]
style = "bg:#000000"
disabled = true # Disabled by default

[directory]
style = "bg:#333333"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "

[git_branch]
symbol = "пРШ"
style = "bg:#333333"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#333333"
format = '[$all_status$ahead_behind ]($style)'

[c]
symbol = "оШЮ "
style = "bg:#FFFFFF fg:#33658A"
format = '[ $symbol ($version) ]($style)'

[cpp]
symbol = "оШЭ "
style = "bg:#FFFFFF fg:#33658A"
format = '[ $symbol ($version) ]($style)'

[elixir]
