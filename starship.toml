format = """
[оВґ](#FFFFFF)\
$os\
$username\
[оВ∞](bg:#333333 fg:#FFFFFF)\
$directory\
[оВ∞](fg:#333333 bg:#FFD700)\
[](bg:#FFD700)\
[оВ∞](fg:#FFD700 bg:#333333)\
$git_branch\
$git_status\
[ оВґ](fg:#FFFFFF bg:#333333)\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$scala\
$docker_context\
